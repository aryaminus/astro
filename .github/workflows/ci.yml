name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Syntax + import check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile-check
        run: |
          python -m py_compile skills/astrology/scripts/astro_engine.py
          python -m py_compile skills/astrology/scripts/api.py
          python -m py_compile skills/astrology/scripts/mcp_server.py
      - name: Import-check (engine via sys.path, wrappers as modules)
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'skills/astrology/scripts')
          import astro_engine
          print('engine OK,', sum(1 for n in dir(astro_engine) if not n.startswith('_')), 'symbols')
          "
          python -c "
          import sys, os
          sys.path.insert(0, 'skills/astrology/scripts')
          sys.path.insert(0, '.')
          # api.py inserts scripts dir into sys.path internally
          import skills.astrology.scripts.api as a
          print('api OK,', sum(1 for r in a.app.routes if hasattr(r, 'path')), 'routes')
          "
      - name: MCP server boots (SSE transport)
        run: |
          # Actually exercise mcp.run() — py_compile/import never reach the
          # __main__ block, so a bad run() call (e.g. host/port kwargs) shipped
          # undetected. Boot over SSE, confirm it binds, then stop it.
          ASTRO_MCP_TRANSPORT=sse PORT=8767 \
            python -m skills.astrology.scripts.mcp_server > /tmp/mcp.log 2>&1 &
          MCP_PID=$!
          ok=0
          for i in $(seq 1 15); do
            sleep 1
            if ! kill -0 "$MCP_PID" 2>/dev/null; then
              echo "FAIL: MCP server exited early"; cat /tmp/mcp.log; exit 1
            fi
            code=$(curl -s -o /dev/null -m 2 -w "%{http_code}" "http://127.0.0.1:8767/sse" || true)
            if [ "$code" = "200" ]; then echo "MCP SSE up after ${i}s (HTTP 200)"; ok=1; break; fi
          done
          kill "$MCP_PID" 2>/dev/null || true
          [ "$ok" = "1" ] || { echo "FAIL: MCP server did not serve /sse"; cat /tmp/mcp.log; exit 1; }

  openapi:
    name: OpenAPI spec validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pyyaml + fastapi
        run: pip install pyyaml -r requirements.txt
      - name: Validate (structure, no duplicate keys, parity with api.py)
        run: |
          python - <<'PY'
          import yaml, sys
          # Reject duplicate mapping keys (safe_load silently keeps the last,
          # which once dropped the GET /profile/{name} operation from the spec).
          class StrictLoader(yaml.SafeLoader): pass
          def _no_dup(loader, node, deep=False):
              seen = set()
              for k, _ in node.value:
                  key = loader.construct_object(k, deep=deep)
                  if key in seen:
                      raise ValueError(f'duplicate key in openapi.yaml: {key!r}')
                  seen.add(key)
              return yaml.SafeLoader.construct_mapping(loader, node, deep)
          StrictLoader.add_constructor(yaml.resolver.BaseResolver.DEFAULT_MAPPING_TAG, _no_dup)
          with open('openapi.yaml') as f:
              spec = yaml.load(f, Loader=StrictLoader)
          assert spec['openapi'].startswith('3.'), 'must be OpenAPI 3.x'
          assert 'paths' in spec and len(spec['paths']) >= 25, 'must declare paths'

          # Parity: every api.py route URL must be documented, and vice versa.
          sys.path.insert(0, 'skills/astrology/scripts'); sys.path.insert(0, '.')
          import skills.astrology.scripts.api as a
          api_paths = {r.path for r in a.app.routes
                       if hasattr(r, 'path') and not r.path.startswith(('/openapi', '/docs', '/redoc'))}
          spec_paths = set(spec['paths'])
          missing = api_paths - spec_paths
          extra = spec_paths - api_paths
          assert not missing, f'paths in api.py but missing from openapi.yaml: {sorted(missing)}'
          assert not extra, f'paths in openapi.yaml but not in api.py: {sorted(extra)}'
          print(f'openapi.yaml OK: v{spec["info"]["version"]}, {len(spec_paths)} paths, parity with api.py verified')
          PY

  engine-smoke:
    name: Engine smoke (19 modes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run all 19 modes
        run: |
          python - <<'PY'
          import json, sys, os
          sys.path.insert(0, '.')
          sys.path.insert(0, 'skills/astrology/scripts')
          import astro_engine
          base = {"year": 1990, "month": 6, "day": 15, "hour": 14, "minute": 30,
                  "lat": 40.7128, "lng": -74.006, "tz": "America/New_York",
                  "time_known": True, "systems": ["western", "vedic", "bazi"]}
          modes = ["natal", "transit", "synastry", "compatibility", "composite",
                   "astrocartography", "horary", "solar_return", "lunar_return",
                   "planetary_return", "navamsa", "varga", "panchang", "moon_phase",
                   "numerology", "progressions", "planetary_hours",
                   "transit_natal_aspects", "event"]
          failures = []
          for m in modes:
              try:
                  params = dict(base, mode=m)
                  if m == "varga":
                      params["varga"] = "D10"
                  if m == "planetary_return":
                      params["planet"] = "Saturn"
                  if m in ("synastry", "compatibility", "composite"):
                      params["partner"] = {"year": 1985, "month": 3, "day": 22,
                                           "hour": 9, "minute": 0, "lat": 51.5,
                                           "lng": -0.12, "tz": "Europe/London",
                                           "time_known": True}
                  r = astro_engine.calculate_full_profile(params)
                  assert r, f"empty result for {m}"
              except Exception as e:
                  failures.append(f"{m}: {e}")
          if failures:
              print("FAIL:", *failures, sep="\n  ")
              sys.exit(1)
          print(f"All {len(modes)} modes OK")
          PY

  api-smoke:
    name: REST API smoke (31 endpoints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Start server
        run: |
          PORT=8765 ASTRO_RATE_LIMIT=0 \
            python -m uvicorn skills.astrology.scripts.api:app \
              --host 127.0.0.1 --port 8765 &
          for i in $(seq 1 15); do
            sleep 1
            if curl -sf -o /dev/null http://127.0.0.1:8765/health; then
              echo "API up after ${i}s"; break
            fi
            if [ "$i" = "15" ]; then echo "FAIL: API not up after 15s"; exit 1; fi
          done
      - name: Public endpoints
        run: |
          for path in / /health /ready /version /metrics /pricing; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8765$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { echo "FAIL: $path returned $code"; exit 1; }
          done
      - name: Chart endpoints (free mode, no auth)
        run: |
          for path in /chart/natal /chart/transit /moon-phase /planetary-hours /panchang /numerology; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "http://127.0.0.1:8765$path" -H "Content-Type: application/json" \
              -d '{"year":1990,"month":6,"day":15,"hour":14,"minute":30,"lat":40.71,"lng":-74.0,"tz":"America/New_York","time_known":true}')
            echo "$path -> $code"
            [ "$code" = "200" ] || { echo "FAIL: $path returned $code"; exit 1; }
          done
      - name: /interact endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://127.0.0.1:8765/interact -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"what does my chart say?"}],"profile":{"year":1990,"month":6,"day":15,"hour":14,"minute":30,"lat":40.71,"lng":-74.0,"tz":"America/New_York","time_known":true}}')
          echo "/interact -> $code"
          [ "$code" = "200" ] || { echo "FAIL: /interact returned $code"; exit 1; }
      - name: Rate-limit enforcement
        run: |
          kill %1 2>/dev/null || true
          sleep 1
          PORT=8766 ASTRO_RATE_LIMIT=2 ASTRO_RATE_WINDOW=60 \
            python -m uvicorn skills.astrology.scripts.api:app \
              --host 127.0.0.1 --port 8766 &
          sleep 3
          for i in 1 2; do
            curl -s -o /dev/null -w "request $i: %{http_code}\n" -X POST \
              http://127.0.0.1:8766/chart/natal -H "Content-Type: application/json" \
              -d '{"year":2000,"month":1,"day":1,"hour":12,"minute":0,"lat":0,"lng":0,"tz":"UTC","time_known":false}'
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://127.0.0.1:8766/chart/natal -H "Content-Type: application/json" \
            -d '{"year":2000,"month":1,"day":1,"hour":12,"minute":0,"lat":0,"lng":0,"tz":"UTC","time_known":false}')
          echo "3rd request (expect 429): $code"
          [ "$code" = "429" ] || { echo "FAIL: rate limit not enforced"; exit 1; }
      - name: Auth gate enforcement
        run: |
          kill %1 2>/dev/null || true
          sleep 1
          PORT=8767 ASTRO_API_KEY=sk_test \
            python -m uvicorn skills.astrology.scripts.api:app \
              --host 127.0.0.1 --port 8767 &
          sleep 3
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://127.0.0.1:8767/chart/natal -H "Content-Type: application/json" \
            -d '{"year":2000,"month":1,"day":1,"hour":12,"minute":0,"lat":0,"lng":0,"tz":"UTC","time_known":false}')
          echo "no auth -> $code (expect 403)"
          [ "$code" = "403" ] || { echo "FAIL: auth not enforced"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://127.0.0.1:8767/chart/natal -H "Content-Type: application/json" \
            -H "Authorization: sk_test" \
            -d '{"year":2000,"month":1,"day":1,"hour":12,"minute":0,"lat":0,"lng":0,"tz":"UTC","time_known":false}')
          echo "with auth -> $code (expect 200)"
          [ "$code" = "200" ] || { echo "FAIL: valid auth rejected"; exit 1; }

  package:
    name: Skill package builds + versions agree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Versions agree across manifests
        run: |
          python - <<'PY'
          import json, re, sys
          plugin = json.load(open('.claude-plugin/plugin.json'))['version']
          market = json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version']
          oapi = re.search(r'^\s*version:\s*([0-9.]+)', open('openapi.yaml').read(), re.M).group(1)
          skill = re.search(r'version:\s*"?([0-9.]+)"?', open('skills/astrology/SKILL.md').read()).group(1)
          versions = {'plugin.json': plugin, 'marketplace.json': market, 'openapi.yaml': oapi, 'SKILL.md': skill}
          print(versions)
          if len(set(versions.values())) != 1:
              print('::error::version mismatch across manifests', versions); sys.exit(1)
          print('all manifests at', plugin)
          PY
      - name: build-skill.sh produces a valid package
        run: |
          bash skills/astrology/scripts/build-skill.sh
          test -f dist/astrology.skill || { echo "::error::astrology.skill not built"; exit 1; }
          tar tzf dist/astrology.skill | grep -qx 'SKILL.md' || { echo "::error::SKILL.md missing"; exit 1; }
          tar tzf dist/astrology.skill | grep -qx 'scripts/astro_engine.py' || { echo "::error::engine missing"; exit 1; }
          echo "skill package OK"
