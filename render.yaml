services:
  - type: web
    name: astro-api
    env: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: ASTRO_LOG_LEVEL
        value: "INFO"
      - key: ASTRO_PROFILE_DIR
        value: "/data/profiles"
      # Optional metering (uncomment + set to enable):
      # - key: ASTRO_API_KEY
      #   sync: false
      # - key: ASTRO_RATE_LIMIT
      #   value: "100"
      # - key: ASTRO_RATE_WINDOW
      #   value: "3600"
