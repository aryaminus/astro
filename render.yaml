services:
  - type: web
    name: astro-api
    runtime: python
    plan: free
    branch: main
    buildCommand: ""
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ASTRO_LOG_LEVEL
        value: "INFO"
      - key: ASTRO_PROFILE_DIR
        value: "/data/profiles"
      # Optional metering (uncomment + set to enable):
      # - key: ASTRO_API_KEY
      #   sync: false
      # - key: ASTRO_RATE_LIMIT
      #   value: "100"
      # - key: ASTRO_RATE_WINDOW
      #   value: "3600"
    disk:
      name: astro-profiles
      mountPath: /data/profiles
      sizeGB: 1

  - type: web
    name: astro-mcp
    runtime: python
    plan: free
    branch: main
    buildCommand: ""
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: ASTRO_MCP_TRANSPORT
        value: "sse"
      - key: ASTRO_MCP_HOST
        value: "0.0.0.0"
      - key: ASTRO_MCP_PORT
        fromService:
          type: web
          name: astro-mcp
          property: port
      - key: ASTRO_LOG_LEVEL
        value: "INFO"
    startCommand: "python -m skills.astrology.scripts.mcp_server"
